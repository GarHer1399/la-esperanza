<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrativo - La Esperanza</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #eceff1; }
        header { background-color: #455a64; color: white; padding: 20px; text-align: center; border-radius: 0 0 20px 20px; }
        .container { padding: 20px; max-width: 600px; margin: auto; }
        
        /* Tarjetas de Reporte (CU-14) */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stat-card h2 { color: #2e7d32; margin: 10px 0 0; font-size: 22px; }
        .stat-card p { margin: 0; color: #666; font-size: 14px; font-weight: bold; }

        /* Lista de Gestión (CU-09 y CU-12) */
        .admin-section { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .admin-section h3 { margin-top: 0; color: #455a64; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f5f5f5; }
        .status-badge { padding: 4px 8px; border-radius: 5px; font-size: 11px; font-weight: bold; }
        .active { background: #c8e6c9; color: #2e7d32; }
        .warning { background: #ffecb3; color: #ffa000; }

        .btn-admin { background: #455a64; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 13px; }
        .logout-btn { display: block; text-align: center; margin-top: 30px; color: #d32f2f; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

    <header>
        <h1 style="margin:0; font-size: 22px;">Panel Asociación</h1>
        <p style="margin:5px 0 0; opacity: 0.8; font-size: 13px;">Control General La Esperanza</p>
    </header>

    <div class="container">
        
        <div class="stats-grid">
            <div class="stat-card">
                <p>VENTAS HOY</p>
                <h2>Q 4,850.00</h2>
            </div>
            <div class="stat-card">
                <p>PRODUCTORES</p>
                <h2>32</h2>
            </div>
        </div>

        <div class="admin-section">
            <h3>Nuevos Registros (Asistidos)</h3>
            <div class="list-item">
                <div>
                    <b>Carlos Batres</b><br>
                    <small>Productor de Tomate</small>
                </div>
                <button class="btn-admin" onclick="alert('Usuario activado en el sistema')">APROBAR</button>
            </div>
            <div class="list-item">
                <div>
                    <b>Tienda El Quetzal</b><br>
                    <small>Comprador Mayorista</small>
                </div>
                <button class="btn-admin" onclick="alert('Usuario activado en el sistema')">APROBAR</button>
            </div>
        </div>

        <div class="admin-section">
            <h3>Reportes / Conflictos</h3>
            <div class="list-item">
                <div>
                    <b>Pedido #1042</b><br>
                    <small>Diferencia en peso de Maíz</small>
                </div>
                <span class="status-badge warning">PENDIENTE</span>
            </div>
        </div>

        <a href="index.html" class="logout-btn">SALIR DEL SISTEMA</a>
    </div>

</body>
</html>
