<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Recepción</title>
    <style>
        body { font-family: sans-serif; background-color: #f5f5f5; padding: 15px; }
        .entrega-card { background: white; padding: 15px; border-radius: 15px; border-left: 6px solid #2e7d32; margin-bottom: 12px; }
        .btn-recibido { background: #1976d2; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h2 style="color: #1976d2; text-align: center;">Confirmar Producto Recibido</h2>
    
    <div class="entrega-card">
        <p style="margin:0;"><b>Pedido #204 - Tomate Riñón</b></p>
        <p style="margin:5px 0; font-size: 14px;">Vendedor: Don Chepe</p>
        <p style="margin:0; font-weight: bold;">Monto Pagado: Q 550.00</p>
        <button class="btn-recibido" onclick="confirmar()">CONFIRMAR QUE YA RECIBÍ EL PRODUCTO</button>
    </div>

    <script>
        function confirmar() {
            alert("✅ Confirmación enviada. Gracias por fortalecer el comercio local con La Esperanza.");
            window.location.href = 'comprador.html';
        }
    </script>

    <p style="text-align: center; color: #999; font-size: 14px; margin-top: 20px;"><i>Solo confirma cuando el producto esté físicamente contigo.</i></p>
    <p style="text-align: center;"><a href="comprador.html" style="color:#666; text-decoration:none;">← Volver al panel</a></p>
</body>
</html>
