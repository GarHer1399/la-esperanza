<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos Recibidos</title>
    <style>
        body { font-family: sans-serif; background-color: #f1f8e9; margin: 0; padding: 15px; }
        .pedido-card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 6px solid #388e3c; }
        .btn-group { display: flex; gap: 8px; margin-top: 15px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; }
        .btn-aceptar { background: #388e3c; color: white; }
        .btn-rechazar { background: #d32f2f; color: white; }
    </style>
</head>
<body>
    <h2 style="color: #2e7d32; text-align: center;">Solicitudes de Compra</h2>
    <div class="pedido-card">
        <p>Cliente: <b>Distribuidora "El Paisano"</b></p>
        <p>Producto: <b>Papa Loman</b></p>
        <p>Cantidad: 10 Quintales</p>
        <p style="font-size: 1.2em; color: #2e7d32;"><b>Total: Q 1,450.00</b></p>
        <div class="btn-group">
            <button class="btn btn-aceptar" onclick="alert('Pedido aceptado')">ACEPTAR</button>
            <button class="btn btn-rechazar" onclick="alert('Pedido rechazado')">RECHAZAR</button>
        </div>
    </div>
    <p style="text-align: center;"><a href="productor.html" style="color:#666; text-decoration:none;">← Volver al panel</a></p>
</body>
</html>
